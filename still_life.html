<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    
    <title>Still Life</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #mobile-pause-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px;
            font-family: sans-serif;
            font-weight: bold;
            color: white;
            background-color: rgba(40, 40, 40, 0.8);
            border: 2px solid #ffffff;
            border-radius: 25px;
            cursor: pointer;
            z-index: 10; /* Lo tiene sopra il canvas */
            user-select: none; /* Evita selezioni accidentali del testo */
        }
        
        #mobile-pause-btn:active {
            background-color: rgba(100, 100, 100, 0.9);
        }

        @media (hover: hover) and (pointer: fine) {
            #mobile-pause-btn {
                display: none;
            }
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <button id="mobile-pause-btn">Pause</button>

    <!-- VERTEX SHADER -->
    <script id="3d-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        attribute vec3 a_normal;
        attribute vec2 a_texcoord;

        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform mat4 u_world;
        uniform mat4 u_worldInverseTranspose;
        uniform mat4 u_textureMatrix;

        varying vec3 v_normal;
        varying vec2 v_texcoord;
        varying vec3 v_surfaceWorldPosition;
        varying vec4 v_projectedTexcoord;

        void main() {
            vec4 worldPosition = u_world * a_position;
            gl_Position = u_projection * u_view * worldPosition;
            v_surfaceWorldPosition = worldPosition.xyz;
            v_normal = mat3(u_worldInverseTranspose) * a_normal;
            v_texcoord = a_texcoord;
            v_projectedTexcoord = u_textureMatrix * worldPosition;
        }
    </script>

    <!-- FRAGMENT SHADER -->
    <script id="3d-fragment-shader" type="x-shader/x-fragment">
        precision highp float;

        varying vec3 v_normal;
        varying vec2 v_texcoord;
        varying vec3 v_surfaceWorldPosition;
        varying vec4 v_projectedTexcoord;

        uniform vec3 u_lightWorldPosition;
        uniform vec3 u_viewWorldPosition;
        uniform vec3 u_ambientLight;
        uniform vec3 u_lightColor;
        uniform bool u_isDoubleSided;
        
        uniform sampler2D u_diffuseMap;
        uniform sampler2D u_projectedTexture;
        uniform float u_bias;
        uniform bool u_shadowsEnabled;
        uniform float u_alpha; // 1.0 solido, 0.6 vetro

        void main() {
            vec3 normal = normalize(v_normal);

            // Inverti la normale solo se stiamo guardando da dietro e il flag double-sided è attivo //u_isDoubleSided && 
            if (!gl_FrontFacing) {
                normal = -normal;
            }

            vec3 surfaceToLightDirection = normalize(u_lightWorldPosition - v_surfaceWorldPosition);
            vec3 surfaceToViewDirection = normalize(u_viewWorldPosition - v_surfaceWorldPosition);
            vec3 halfVector = normalize(surfaceToLightDirection + surfaceToViewDirection);

            float light = max(dot(normal, surfaceToLightDirection), 0.0);
            float specular = 0.0;
            if (light > 0.0) {
                specular = pow(max(dot(normal, halfVector), 0.0), 50.0);
            }

            vec3 projectedTexcoord = v_projectedTexcoord.xyz / v_projectedTexcoord.w;
            
            //float bias = max(0.01 * (1.0 - dot(normal, surfaceToLightDirection)), 0.005);
            //float currentDepth = projectedTexcoord.z - bias;
            
            // bias prova a bilanciare peter panning e acne
            float cosTheta = clamp(dot(normal, surfaceToLightDirection), 0.0, 1.0);
            float bias = mix(0.01, 0.005, cosTheta);
            float currentDepth = projectedTexcoord.z - bias;

            bool inRange =
                projectedTexcoord.x >= 0.0 && projectedTexcoord.x <= 1.0 &&
                projectedTexcoord.y >= 0.0 && projectedTexcoord.y <= 1.0;

            float shadowLight = 1.0;
            if (u_shadowsEnabled) {
                float projectedDepth = texture2D(u_projectedTexture, projectedTexcoord.xy).r;
                shadowLight = (inRange && projectedDepth <= currentDepth) ? 0.0 : 1.0;
            }
            
            // Soft shadows con PCF
            /*float shadowLight = 0.0;
            if (u_shadowsEnabled) {
                float texelSize = 1.0 / 2048.0;
                for (int x = -1; x <= 1; x++) {
                    for (int y = -1; y <= 1; y++) {
                        vec2 offset = vec2(float(x), float(y)) * texelSize;
                        float projectedDepth = texture2D(u_projectedTexture, projectedTexcoord.xy + offset).r;
                        shadowLight += (inRange && projectedDepth <= currentDepth) ? 0.0 : 1.0;
                    }
                }
                shadowLight /= 9.0;
            } else {
                shadowLight = 1.0;
            }*/

            vec4 texColor = texture2D(u_diffuseMap, v_texcoord);
            vec3 finalColor = (u_ambientLight * texColor.rgb) + 
                              (texColor.rgb * light * u_lightColor * shadowLight) + 
                              (specular * u_lightColor * shadowLight);

            gl_FragColor = vec4(finalColor, texColor.a * u_alpha);
        }
    </script>

    <!-- SHADERS per Shadow Mapping -->
    <script id="depth-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform mat4 u_world;
        void main() {
            gl_Position = u_projection * u_view * u_world * a_position;
        }
    </script>

    <script id="depth-fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        void main() {
            // Non fa nulla, WebGL scrive automaticamente la profondità nel buffer!
            gl_FragColor = vec4(1.0); 
        }
    </script>

    <script src="resources/m4.js"></script>
    <script src="resources/webgl-utils.js"></script>
    <script src="resources/mesh_utils.js"></script> <!-- Assicurati di averlo! -->
    <script src="resources/glm_utils.js"></script>
    <script src="resources/dat.gui.js"></script>
    
    <script src="gui.js"></script>
    <script src="animation.js"></script>
    <script src="still_life.js"></script>
    <script src="input.js"></script>

</body>
</html>
