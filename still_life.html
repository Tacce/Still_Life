<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    
    <title>Still Life</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a;
        }

        #canvas {
            display: block; width: 100vw; height: 100vh;
        }

        #mobile-controls {
            position: absolute;
            left: 18px;
            bottom: 18px;
            width: auto;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            gap: 12px;
            z-index: 10;
            pointer-events: none; 
        }

        .mobile-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            pointer-events: none;
            width: auto;
        }

        .mobile-panel.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        #mobile-light-controls {
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .mobile-keypad {
            display: grid;
            grid-template-columns: repeat(3, minmax(56px, 1fr));
            grid-template-areas:
                "q w e"
                "a s d";
            gap: 8px;
            width: min(198px, 66vw);
            pointer-events: none;
        }

        .mobile-keypad .mobile-btn {
            width: 100%;
            min-width: 0;
            padding: 10px 0;
            text-align: center;
            touch-action: none;
            font-size: 14px;
            border-width: 1px;
            border-radius: 16px;
        }

        .mobile-keypad [data-light-key="w"] { grid-area: w; }
        .mobile-keypad [data-light-key="a"] { grid-area: a; }
        .mobile-keypad [data-light-key="s"] { grid-area: s; }
        .mobile-keypad [data-light-key="d"] { grid-area: d; }
        .mobile-keypad [data-light-key="q"] { grid-area: q; }
        .mobile-keypad [data-light-key="e"] { grid-area: e; }

        .mobile-btn {
            pointer-events: auto; /* Riabilita i tap sui pulsanti */
            padding: 11px 16px;
            font: bold 14px sans-serif;
            color: white;
            background-color: rgba(40, 40, 40, 0.8);
            border: 1px solid #ffffff;
            border-radius: 18px;
            cursor: pointer;
            user-select: none;
        }

        .mobile-btn:active {
            background-color: rgba(100, 100, 100, 0.9);
        }

        @media (hover: hover) and (pointer: fine) {
            #mobile-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="mobile-controls">
        <div id="mobile-main-controls" class="mobile-panel">
            <button id="mobile-pause-btn" class="mobile-btn">Pause</button>
            <button id="mobile-skybox-btn" class="mobile-btn">Change Skybox</button>
            <button id="mobile-light-btn" class="mobile-btn">Move Light</button>
        </div>
        <div id="mobile-light-controls" class="mobile-panel hidden">
            <div class="mobile-keypad">
                <span></span>
                <button class="mobile-btn" data-light-key="w">W</button>
                <span></span>
                <button class="mobile-btn" data-light-key="a">A</button>
                <button class="mobile-btn" data-light-key="s">S</button>
                <button class="mobile-btn" data-light-key="d">D</button>
                <button class="mobile-btn" data-light-key="q">Q</button>
                <button class="mobile-btn" data-light-key="e">E</button>
                <span></span>
            </div>
            <button id="mobile-light-back-btn" class="mobile-btn">Back</button>
        </div>
    </div>


    <!-- VERTEX SHADER -->
    <script id="3d-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        attribute vec3 a_normal;
        attribute vec3 a_flatNormal;
        attribute vec2 a_texcoord;
        attribute vec3 a_tangent;

        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform mat4 u_world;
        uniform mat4 u_worldInverseTranspose;
        uniform mat4 u_textureMatrix;

        varying vec3 v_normal;
        varying vec3 v_flatNormal;
        varying vec3 v_tangent;
        varying vec2 v_texcoord;
        varying vec3 v_surfaceWorldPosition;
        varying vec4 v_projectedTexcoord;

        void main() {
            vec4 worldPosition = u_world * a_position;
            gl_Position = u_projection * u_view * worldPosition;
            v_surfaceWorldPosition = worldPosition.xyz;

            mat3 normalMatrix = mat3(u_worldInverseTranspose);
            v_normal = normalMatrix * a_normal;
            v_flatNormal = normalMatrix * a_flatNormal;
            v_tangent = normalMatrix * a_tangent;

            v_texcoord = a_texcoord;
            v_projectedTexcoord = u_textureMatrix * worldPosition;
        }
    </script>

    <!-- FRAGMENT SHADER -->
    <script id="3d-fragment-shader" type="x-shader/x-fragment">
        precision highp float;

        varying vec3 v_normal;
        varying vec3 v_flatNormal;
        varying vec3 v_tangent;
        varying vec2 v_texcoord;
        varying vec3 v_surfaceWorldPosition;
        varying vec4 v_projectedTexcoord;

        uniform vec3 u_lightWorldPosition;
        uniform vec3 u_viewWorldPosition;
        uniform vec3 u_ambientLight;
        uniform vec3 u_lightColor;

        uniform bool u_useFlatShading;
        uniform float u_Ka;
        uniform float u_Kd;
        uniform float u_Ks;
        uniform float u_shininess;
        uniform bool u_isEmissive;
        uniform sampler2D u_diffuseMap;
        uniform sampler2D u_projectedTexture;
        uniform bool u_shadowsEnabled;
        uniform float u_alpha; 
        
        uniform sampler2D u_bumpMap;      
        uniform bool u_useBumpMap;
        uniform float u_bumpStrength;
        uniform vec2 u_bumpMapSize;
        uniform float u_bumpScale;

        void main() {
            vec3 normal;

            if (u_useFlatShading) {
                normal = normalize(v_flatNormal);
            } else {
                normal = normalize(v_normal);
            }

            if (!gl_FrontFacing) {
                normal = -normal;
            }

            //BUMP MAPPING
            if (u_useBumpMap) {
                vec3 t = normalize(normalize(v_tangent) - dot(normalize(v_tangent), normal) * normal);
                vec3 binormal = normalize(cross(normal, t));

                vec2 texelSize = u_bumpScale / u_bumpMapSize;

                float heightL = texture2D(u_bumpMap, v_texcoord - vec2(texelSize.x, 0.0)).r;
                float heightR = texture2D(u_bumpMap, v_texcoord + vec2(texelSize.x, 0.0)).r;
                float heightB = texture2D(u_bumpMap, v_texcoord - vec2(0.0, texelSize.y)).r;
                float heightU = texture2D(u_bumpMap, v_texcoord + vec2(0.0, texelSize.y)).r;

                float dX = 0.5 * (heightR - heightL);
                float dY = 0.5 * (heightU - heightB);

                vec3 bumpVector = dX * t + dY * binormal;
                normal = normalize(normal - u_bumpStrength * bumpVector);
            }

            vec3 surfaceToLightDirection = normalize(u_lightWorldPosition - v_surfaceWorldPosition);
            vec3 surfaceToViewDirection = normalize(u_viewWorldPosition - v_surfaceWorldPosition);
            
            vec3 projectedTexcoord = v_projectedTexcoord.xyz / v_projectedTexcoord.w;
            float bias = 0.0002;
            float currentDepth = projectedTexcoord.z - bias;

            bool inRange =
                projectedTexcoord.x >= 0.0 && projectedTexcoord.x <= 1.0 &&
                projectedTexcoord.y >= 0.0 && projectedTexcoord.y <= 1.0 && v_projectedTexcoord.w > 0.0;

            float shadowLight = 1.0;
            if (u_shadowsEnabled) {
                float projectedDepth = texture2D(u_projectedTexture, projectedTexcoord.xy).r;
                shadowLight = (inRange && projectedDepth <= currentDepth) ? 0.0 : 1.0;
            }

            // PHONG
            vec4 texColor = texture2D(u_diffuseMap, v_texcoord);

            if (u_isEmissive) {
                gl_FragColor = vec4(texColor.rgb * u_lightColor * 1.5, texColor.a * u_alpha);
                return;
            }

            // Componente Diffusa (Legge di Lambert)
            float lambertian = max(dot(normal, surfaceToLightDirection), 0.0);

            // Componente Speculare
            float specular = 0.0;

            if (lambertian > 0.0) {
                vec3 R = reflect(-surfaceToLightDirection, normal);
                float specAngle = max(dot(R, surfaceToViewDirection), 0.0);
                specular = pow(specAngle, u_shininess);
            }

            vec3 ambientTerm = u_Ka * u_ambientLight * texColor.rgb;
            vec3 diffuseTerm = u_Kd * lambertian * texColor.rgb * u_lightColor * shadowLight;
            vec3 specularTerm = u_Ks * specular * u_lightColor * shadowLight;

            vec3 diffuseAndAmbient = ambientTerm + diffuseTerm;
            gl_FragColor = vec4(diffuseAndAmbient, texColor.a * u_alpha) + vec4(specularTerm, 0.0);
        }
    </script>
    
    <!-- SHADERS per il Wireframe -->
    <script id="wire-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;

        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform mat4 u_world;

        void main() {
            gl_Position = u_projection * u_view * u_world * a_position;
        }
    </script>

    <script id="wire-fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        void main() {
            gl_FragColor = vec4(0.10, 0.04, 0.01, 1.0);
        }
    </script>
    
    <!-- SHADERS per Shadow Mapping -->
    <script id="depth-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform mat4 u_world;
        void main() {
            gl_Position = u_projection * u_view * u_world * a_position;
        }
    </script>

    <script id="depth-fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        void main() {
            // Non fa nulla, WebGL scrive automaticamente la profondità nel buffer!
            gl_FragColor = vec4(1.0); 
        }
    </script>

    <!-- SHADERS per Skybox -->
    <script id="skybox-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        varying vec4 v_position;
        void main() {
            v_position = a_position;
            // Forziamo la profondità Z a 1.0 (il punto più lontano in clip space)
            gl_Position = vec4(a_position.xy, 1.0, 1.0);
        }
    </script>

    <script id="skybox-fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        uniform samplerCube u_skybox;
        uniform mat4 u_viewDirectionProjectionInverse;

        varying vec4 v_position;
        void main() {
            // Calcoliamo la direzione del raggio di sguardi partendo dal quad 2D
            vec4 t = u_viewDirectionProjectionInverse * v_position;
            // Campioniamo la texture cubica tridimensionale usando la direzione normalizzata
            gl_FragColor = textureCube(u_skybox, normalize(t.xyz / t.w));
        }
    </script>

    <!-- SHADERS per il Piano del Pavimento -->
    <script id="floor-vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        attribute vec2 a_texcoord;

        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform mat4 u_world;
        uniform mat4 u_textureMatrix; // 
        varying vec3 v_worldPos;
        varying vec2 v_texcoord;
        varying vec4 v_projectedTexcoord; 

        void main() {
            vec4 worldPos = u_world * a_position;
            v_worldPos = worldPos.xyz;
            v_texcoord = a_texcoord * 100.0; // Moltiplicatore per non sgranare la texture del pavimento
            
            v_projectedTexcoord = u_textureMatrix * worldPos;
            
            gl_Position = u_projection * u_view * worldPos;
        }
    </script>

    <script id="floor-fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        uniform sampler2D u_floorTexture;
        uniform samplerCube u_skybox;
        uniform vec3 u_cameraPos;

        varying vec3 v_worldPos;
        varying vec2 v_texcoord;

        void main() {
            vec4 floorColor = texture2D(u_floorTexture, v_texcoord);

            vec3 dir = normalize(v_worldPos - u_cameraPos);
            vec4 skyColor = textureCube(u_skybox, dir);

            float dist = length(v_worldPos.xz - u_cameraPos.xz);
            float fogFactor = smoothstep(50.0, 200.0, dist);

            gl_FragColor = mix(floorColor, skyColor, fogFactor);
        }
    </script>

<script id="planar-shadow-vertex-shader" type="x-shader/x-vertex">
    attribute vec4 a_position;
    
    uniform mat4 u_projection;
    uniform mat4 u_view;
    uniform mat4 u_world;
    uniform vec3 u_lightPos;
    uniform float u_floorY;
    uniform bool u_isDirectional;

    varying vec3 v_shadowPos; 

    void main() {
        vec4 worldPos = u_world * a_position;

        vec3 dir;
        vec3 startPos;

        if (u_isDirectional) {
            dir = -normalize(u_lightPos);
            startPos = worldPos.xyz;
        } else {
            dir = worldPos.xyz - u_lightPos;
            startPos = u_lightPos;

            if (dir.y >= -0.001) {
                gl_Position = vec4(2.0, 2.0, 2.0, 1.0);
                return;
            }
        }

        float t = (u_floorY - startPos.y) / dir.y;
        vec3 shadowPos = startPos + dir * t;

        shadowPos.y = u_floorY + 0.05;
        v_shadowPos = shadowPos;

        gl_Position = u_projection * u_view * vec4(shadowPos, 1.0);
    }
</script>

    <script id="planar-shadow-fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        uniform vec3 u_cameraPos;
        varying vec3 v_shadowPos;
        uniform vec3 u_ambientLight;

        void main() {
            // Se è notte le ombre diventano più scure, se è giorno diventano più chiare
            float ambientLight = (u_ambientLight.r + u_ambientLight.g + u_ambientLight.b);
            float dynamicAlpha = mix(0.9, 0.6, clamp(ambientLight, 0.0, 1.0));
            // Distanza dell'ombra dalla telecamera (solo su X e Z)
            float dist = length(v_shadowPos.xz - u_cameraPos.xz);
            float fogFactor = smoothstep(50.0, 200.0, dist);
            float finalAlpha = mix(dynamicAlpha,  0.0, fogFactor);
            gl_FragColor = vec4(0.0, 0.0, 0.0, finalAlpha); 
        }
    </script>

    <script src="resources/webgl-utils.js"></script>
    <script src="resources/mesh_utils.js"></script>

    <script src="loader.js"></script>

    <script src="input.js"></script>

</body>
</html>
